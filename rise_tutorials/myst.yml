# See docs at: https://mystmd.org/guide/frontmatter
version: 1

project:
  id: 9ffd786c-e60e-4d7b-a61d-545039695ab6
  title: RISE Tutorials
  description: >
    Open-source, community-driven AI tutorials for medical imaging,
    by and for the RISE-MICCAI initiative. From CNNs to foundation models.
  keywords:
    - medical imaging
    - deep learning
    - MICCAI
    - AI tutorials
    - retina classification
    - multiple instance learning
  authors:
    - name: RISE-MICCAI Community
      url: https://github.com/RISE-MICCAI
  github: https://github.com/RISE-MICCAI/rise-tutorials-website
  license: CC-BY-4.0
  open_access: true
  binder: https://mybinder.org
  # Jupyter Book 2.0 Enhanced Features
  settings:
    # Enable interactive widgets and outputs
    widgets: true
    # Enable Thebe for live code execution
    thebe: true
    # Enhanced cross-referencing
    crossref:
      resolve: true
      prefix: tutorial
    # Enable MyST Markdown extensions
    myst:
      extensions:
        - colon_fence
        - deflist
        - dollarmath
        - amsmath
        - linkify
        - substitution
        - tasklist
        - attrs_inline
      # Enable admonitions and callouts
      enable_extensions:
        - html_admonition
        - html_image
    # Enhanced syntax highlighting
    syntax_highlighting:
      language: python
      theme: github-dark
  toc:
    - file: intro.md
    #- file: videos.md
    - file: tuto/tutorial-rise-classification.ipynb
    - file: tuto/Retina_classification_using_CNN_.ipynb
    - file: tuto/tutorial-torchmil.ipynb
    - file: tuto/multi_modal_xai_tutorial.ipynb
    - file: tuto/BraTS19_Segmentation_Tutorial.ipynb

site:
  template: book-theme
  # Jupyter Book 2.0 Theme Enhancements
  options:
    url: https://tutorial.rise-miccai.org
    favicon: logo-rise.png
    logo: logo-rise.png
    logo_text: RISE Tutorials
    style: _static/custom.css
    # Enhanced theming options
    hide_toc: false
    show_prev_next: true
    use_repository_button: true
    use_issues_button: true
    use_edit_page_button: true
    repository_url: https://github.com/RISE-MICCAI/rise-tutorials-website
    repository_branch: main
    path_to_docs: rise_tutorials
    # Enhanced navigation
    nav:
      - title: Tutorials
        url: /intro
      - title: Videos
        url: /videos
      - title: GitHub
        url: https://github.com/RISE-MICCAI/rise-tutorials-website
      - title: Contribute
        url: https://github.com/RISE-MICCAI/rise-tutorials-website/blob/main/CONTRIBUTING.md
    # Interactive features
    launch_buttons:
      notebook_interface: jupyterlab
      binderhub_url: https://mybinder.org
      thebe: true
      colab_url: https://colab.research.google.com
