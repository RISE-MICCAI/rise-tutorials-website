name: deploy-book

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]        # build-only on PRs (no deploy)
  workflow_dispatch:         # allow manual runs from the Actions tab

# ── Permissions (required by actions/deploy-pages) ──────────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# ── Prevent concurrent deploys ───────────────────────────────────────────────
concurrency:
  group: "pages"
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. BUILD ────────────────────────────────────────────────────────────────
  build:
    name: Build Jupyter Book
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── Node.js (required by JBook v2 / MyST themes) ─────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Install Python deps ──────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Verify versions ─────────────────────────────────────────────────
      - name: Show tool versions
        run: |
          python --version
          jupyter-book --version || jupyter book --version
          node --version
          npm --version

      # ── Build the book ──────────────────────────────────────────────────
      - name: Build Jupyter Book
        run: jupyter book build rise_tutorials/

      # ── Verify output ───────────────────────────────────────────────────
      - name: Verify HTML output
        run: |
          echo "=== _build contents ==="
          ls -la rise_tutorials/_build/ || echo "No _build directory!"
          echo "=== HTML contents ==="
          ls -la rise_tutorials/_build/html/ || echo "No HTML output!"

      # ── Upload artifact for deploy job ──────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: rise_tutorials/_build/html

  # ── 2. DEPLOY (main branch only) ────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

